# Joint limits for the dual-arm cell.
# Joints are prefixed to match dual_arm.urdf.xacro output:
#   Melfa RV5AS: melfa_rv5as_joint_1 .. 6
#   Aubo i5:     aubo_{shoulder,upperArm,foreArm,wrist1,wrist2,wrist3}_joint

default_velocity_scaling_factor: 0.1
default_acceleration_scaling_factor: 0.1

joint_limits:
  # --- Melfa RV5AS (from melfa_rv5as_moveit_config/config/joint_limits.yaml) ---
  melfa_rv5as_joint_1:
    has_velocity_limits: true
    max_velocity: 2.1642100000000002
    has_acceleration_limits: true
    max_acceleration: 6.0
  melfa_rv5as_joint_2:
    has_velocity_limits: true
    max_velocity: 2.1642100000000002
    has_acceleration_limits: true
    max_acceleration: 6.0
  melfa_rv5as_joint_3:
    has_velocity_limits: true
    max_velocity: 2.1642100000000002
    has_acceleration_limits: true
    max_acceleration: 6.0
  melfa_rv5as_joint_4:
    has_velocity_limits: true
    max_velocity: 3.4382999999999999
    has_acceleration_limits: true
    max_acceleration: 9.0
  melfa_rv5as_joint_5:
    has_velocity_limits: true
    max_velocity: 6.2133700000000003
    has_acceleration_limits: true
    max_acceleration: 18.0
  melfa_rv5as_joint_6:
    has_velocity_limits: true
    max_velocity: 6.2831799999999998
    has_acceleration_limits: true
    max_acceleration: 18.0

  # --- Aubo i5 (from aubo_moveit_config/config/joint_limits.yaml) ---
  aubo_shoulder_joint:
    has_velocity_limits: true
    max_velocity: 3.15
    has_acceleration_limits: false
    max_acceleration: 3.15
  aubo_upperArm_joint:
    has_velocity_limits: true
    max_velocity: 3.15
    has_acceleration_limits: false
    max_acceleration: 3.15
  aubo_foreArm_joint:
    has_velocity_limits: true
    max_velocity: 3.15
    has_acceleration_limits: false
    max_acceleration: 3.15
  aubo_wrist1_joint:
    has_velocity_limits: true
    max_velocity: 3.2
    has_acceleration_limits: false
    max_acceleration: 3.2
  aubo_wrist2_joint:
    has_velocity_limits: true
    max_velocity: 3.2
    has_acceleration_limits: false
    max_acceleration: 3.2
  aubo_wrist3_joint:
    has_velocity_limits: true
    max_velocity: 3.2
    has_acceleration_limits: false
    max_acceleration: 3.2
