# MoveIt controller manager configuration for the dual-arm cell.
# Controller names must match the ros2_control spawner names in
# dual_arm_controllers.yaml.  MoveIt will call the FollowJointTrajectory
# action at /<controller_name>/follow_joint_trajectory.

controller_names:
  - melfa_joint_trajectory_controller
  - aubo_joint_trajectory_controller

melfa_joint_trajectory_controller:
  type: FollowJointTrajectory
  action_ns: follow_joint_trajectory
  default: true
  joints:
    - melfa_rv5as_joint_1
    - melfa_rv5as_joint_2
    - melfa_rv5as_joint_3
    - melfa_rv5as_joint_4
    - melfa_rv5as_joint_5
    - melfa_rv5as_joint_6

aubo_joint_trajectory_controller:
  type: FollowJointTrajectory
  action_ns: follow_joint_trajectory
  default: true
  joints:
    - aubo_shoulder_joint
    - aubo_upperArm_joint
    - aubo_foreArm_joint
    - aubo_wrist1_joint
    - aubo_wrist2_joint
    - aubo_wrist3_joint
